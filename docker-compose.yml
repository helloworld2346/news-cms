services:  
  postgres:  
    image: postgres:16-alpine  
    container_name: news-cms-postgres  
    restart: unless-stopped  
    environment:  
      POSTGRES_USER: newscms  
      POSTGRES_PASSWORD: newscms  
      POSTGRES_DB: newscms  
    ports:  
      - "5432:5432"  
    volumes:  
      - pgdata:/var/lib/postgresql/data  
    healthcheck:  
      test: ["CMD-SHELL", "pg_isready -U newscms -d newscms"]  
      interval: 5s  
      timeout: 5s  
      retries: 5  
    networks:  
      - news-cms  
  
  backend:  
    build:  
      context: ./backend  
      dockerfile: Dockerfile  
    container_name: news-cms-backend  
    restart: unless-stopped  
    depends_on:  
      postgres:  
        condition: service_healthy  
    environment:  
      DB_HOST: postgres  
      DB_PORT: "5432"  
      DB_USER: newscms  
      DB_PASSWORD: newscms  
      DB_NAME: newscms  
      APP_PORT: "8080"  
    ports:  
      - "8080:8080"  
    networks:  
      - news-cms  
  
volumes:  
  pgdata:  
  
networks:  
  news-cms:  
    driver: bridge
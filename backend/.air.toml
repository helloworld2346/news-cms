root = "."  
tmp_dir = "tmp"  
  
[build]  
  cmd = "go build -o ./tmp/server ./cmd/server"  
  bin = "./tmp/server"  
  full_bin = "./tmp/server"  
  include_ext = ["go", "yaml", "yml", "env"]  
  exclude_dir = ["tmp", "uploads", "docs", "migrations", "bin"]  
  delay = 500  
  stop_on_error = true  
  
[log]  
  time = true  
  
[misc]  
  clean_on_exit = true